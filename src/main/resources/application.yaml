file:
  upload-dir: uploads/photos
  base-url: http://localhost:8080

spring:
  web:
    resources:
      static-locations:
        - classpath:/static/
        - file:./uploads/
      add-mappings: true

  datasource:
    url: jdbc:postgresql://localhost:5432/postgres
    username: postgres
    password: zxcqwe
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-init-sql: SET NAMES 'UTF8'

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.xml
    enabled: true

  thymeleaf:
    cache: false
    prefix: classpath:/templates/
    suffix: .html
    encoding: UTF-8
    mode: HTML

  http:
    encoding:
        charset: UTF-8
        enabled: true
        force: true

  servlet:
    multipart:
      enabled: true
      max-file-size: 5MB
      max-request-size: 5MB
      file-size-threshold: 2KB
      location: ${java.io.tmpdir}

server:
  port: 8080
  servlet:
    context-path: /
    encoding:
      charset: UTF-8
      enabled: true
      force: true

logging:
  level:
    com.employeemanagement: DEBUG
    org.springframework.web: DEBUG