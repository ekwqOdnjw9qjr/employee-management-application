<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Performance Evaluations</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/">EMS</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav">
                <li class="nav-item"><a class="nav-link" href="/departments">Departments</a></li>
                <li class="nav-item"><a class="nav-link" href="/employees">Employees</a></li>
                <li class="nav-item"><a class="nav-link" href="/tasks">Tasks</a></li>
                <li class="nav-item"><a class="nav-link" href="/histories">Histories</a></li>
                <li class="nav-item"><a class="nav-link" href="/assignments">Assignments</a></li>
                <li class="nav-item"><a class="nav-link" href="/evaluations">Evaluations</a></li>
                <li class="nav-item"><a class="nav-link" href="/trainings">Trainings</a></li>
                <li class="nav-item"><a class="nav-link" href="/queries">Query/Procedure</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

    <div class="d-flex justify-content-between mb-3">
        <h2>Performance Evaluations</h2>
        <a href="/evaluations/create" class="btn btn-primary">+ Add Evaluation</a>
    </div>

    <div class="table-responsive">
        <table class="table table-striped table-hover">
            <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Employee</th>
                <th>Reviewer</th>
                <th>Date</th>
                <th>KPI</th>
                <th>Score</th>
                <th>Comment</th>
                <th>Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="eval : ${evaluations}">
                <td th:text="${eval.evaluationId}"></td>
                <td th:text="${eval.employeeFullName}"></td>
                <td th:text="${eval.reviewerFullName}"></td>
                <td th:text="${eval.evaluationDate}"></td>
                <td th:text="${eval.kpi}"></td>
                <td>
                            <span th:class="${eval.score >= 80} ? 'badge bg-success' :
                                          (eval.score >= 60 ? 'badge bg-warning' : 'badge bg-danger')"
                                  th:text="${eval.score}"></span>
                </td>
                <td th:text="${eval.comment}"></td>
                <td>
                    <a th:href="@{/evaluations/edit/{id}(id=${eval.evaluationId})}" class="btn btn-sm btn-info">Edit</a>
                    <form method="post" th:action="@{/evaluations/delete/{id}(id=${eval.evaluationId})}" class="d-inline"
                          onsubmit="return confirm('Delete this evaluation?')">
                        <button type="submit" class="btn btn-sm btn-danger">Delete</button>
                    </form>
                </td>
            </tr>
            <tr th:if="${evaluations.isEmpty()}">
                <td colspan="8" class="text-center">No evaluations found</td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
