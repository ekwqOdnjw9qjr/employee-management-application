<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Trainings</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/">EMS</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav">
                <li class="nav-item"><a class="nav-link" href="/departments">Departments</a></li>
                <li class="nav-item"><a class="nav-link" href="/employees">Employees</a></li>
                <li class="nav-item"><a class="nav-link" href="/tasks">Tasks</a></li>
                <li class="nav-item"><a class="nav-link" href="/histories">Histories</a></li>
                <li class="nav-item"><a class="nav-link" href="/assignments">Assignments</a></li>
                <li class="nav-item"><a class="nav-link" href="/evaluations">Evaluations</a></li>
                <li class="nav-item"><a class="nav-link" href="/trainings">Trainings</a></li>
                <li class="nav-item"><a class="nav-link" href="/queries">Query/Procedure</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

    <div class="d-flex justify-content-between mb-3">
        <h2>Employee Trainings</h2>
        <a href="/trainings/create" class="btn btn-primary">+ Add Training</a>
    </div>

    <div class="table-responsive">
        <table class="table table-striped table-hover">
            <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Employee</th>
                <th>Course Name</th>
                <th>Organization</th>
                <th>Start Date</th>
                <th>End Date</th>
                <th>Status</th>
                <th>Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="training : ${trainings}">
                <td th:text="${training.trainingId}"></td>
                <td th:text="${training.employeeFullName}"></td>
                <td th:text="${training.courseName}"></td>
                <td th:text="${training.organization}"></td>
                <td th:text="${training.startDate}"></td>
                <td th:text="${training.endDate}"></td>
                <td>
                            <span th:class="${training.status == 'COMPLETED'} ? 'badge bg-success' :
                                          (training.status == 'IN_PROGRESS' ? 'badge bg-primary' : 'badge bg-secondary')"
                                  th:text="${training.status}"></span>
                </td>
                <td>
                    <a th:href="@{/trainings/edit/{id}(id=${training.trainingId})}" class="btn btn-sm btn-info">Edit</a>
                    <form method="post" th:action="@{/trainings/delete/{id}(id=${training.trainingId})}" class="d-inline"
                          onsubmit="return confirm('Delete this training?')">
                        <button type="submit" class="btn btn-sm btn-danger">Delete</button>
                    </form>
                </td>
            </tr>
            <tr th:if="${trainings.isEmpty()}">
                <td colspan="8" class="text-center">No trainings found</td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
