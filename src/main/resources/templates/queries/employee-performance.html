<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Employee Performance</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/">EMS</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav">
                <li class="nav-item"><a class="nav-link" href="/departments">Departments</a></li>
                <li class="nav-item"><a class="nav-link" href="/employees">Employees</a></li>
                <li class="nav-item"><a class="nav-link" href="/tasks">Tasks</a></li>
                <li class="nav-item"><a class="nav-link" href="/queries">Queries</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>Employee Performance Ratings</h2>
        <a href="/queries" class="btn btn-secondary">← Back</a>
    </div>

    <div class="card">
        <div class="card-body">
            <div class="table-responsive">
                <table class="table table-striped table-bordered">
                    <thead class="table-dark">
                    <tr>
                        <th>#</th>
                        <th>Employee Name</th>
                        <th>Department</th>
                        <th>Evaluations Count</th>
                        <th>Average Score</th>
                        <th>Rating</th>
                        <th>Last Evaluation</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="row, stat : ${results}">
                        <td th:text="${stat.count}"></td>
                        <td th:text="${row.employeeName}">-</td>
                        <td th:text="${row.departmentName}">-</td>
                        <td th:text="${row.evaluationsCount}">-</td>
                        <td th:text="${row.averageScore}">-</td>
                        <td>
                                    <span th:class="${row.performanceRating == 'Excellent'} ? 'badge bg-success' :
                                                  (row.performanceRating == 'Good' ? 'badge bg-info' :
                                                  (row.performanceRating == 'Satisfactory' ? 'badge bg-warning' : 'badge bg-danger'))"
                                          th:text="${row.performanceRating}"></span>
                        </td>
                        <td th:text="${row.lastEvaluationDate}">-</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
</body>
</html>
