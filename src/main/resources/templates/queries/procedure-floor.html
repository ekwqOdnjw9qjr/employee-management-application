<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Employees by Floor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/">EMS</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav">
                <li class="nav-item"><a class="nav-link" href="/departments">Departments</a></li>
                <li class="nav-item"><a class="nav-link" href="/employees">Employees</a></li>
                <li class="nav-item"><a class="nav-link" href="/tasks">Tasks</a></li>
                <li class="nav-item"><a class="nav-link" href="/queries">Queries</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div class="d-flex justify-content-between mb-3">
        <h2>Employees on Floor <span th:text="${floor}"></span></h2>
        <a href="/queries" class="btn btn-secondary">← Back</a>
    </div>

    <div th:if="${results != null and !results.isEmpty()}">
        <div class="table-responsive">
            <table class="table table-striped table-bordered">
                <thead class="table-dark">
                <tr>
                    <th>#</th>
                    <th>Full Name</th>
                    <th>Position</th>
                    <th>Phone</th>
                    <th>Department</th>
                    <th>Floor</th>
                    <th>Office</th>
                    </td>
                </thead>
                <tbody>
                <tr th:each="row, stat : ${results}">
                    <td th:text="${stat.count}"></td>
                    <td th:text="${row.fullName}">-</td>
                    <td th:text="${row.position}">-</td>
                    <td th:text="${row.phone}">-</td>
                    <td th:text="${row.departmentName}">-</td>
                    <td th:text="${row.floor}">-</td>
                    <td th:text="${row.office}">-</td>
                </tr>
                </tbody>
            </table>
        </div>
        <div class="mt-3">Total: <strong th:text="${results.size()}"></strong> employees</div>
    </div>

    <div th:if="${results == null or results.isEmpty()}" class="alert alert-warning">
        No employees found on floor <span th:text="${floor}"></span>
    </div>
</div>
</body>
</html>
