<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Department Statistics</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/">EMS</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav">
                <li class="nav-item"><a class="nav-link" href="/departments">Departments</a></li>
                <li class="nav-item"><a class="nav-link" href="/employees">Employees</a></li>
                <li class="nav-item"><a class="nav-link" href="/tasks">Tasks</a></li>
                <li class="nav-item"><a class="nav-link" href="/queries">Queries</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>Department Statistics</h2>
        <div>
            <a href="/queries" class="btn btn-secondary">← Back</a>
        </div>
    </div>

    <!-- Простая таблица без сложных вычислений -->
    <div class="card">
        <div class="card-header">
            <h5 class="mb-0">Department Details</h5>
        </div>
        <div class="card-body">
            <div class="table-responsive">
                <table class="table table-striped table-hover">
                    <thead class="table-dark">
                    <tr>
                        <th>Department Name</th>
                        <th>Floor</th>
                        <th>Employee Count</th>
                        <th>Total Salary Fund</th>
                        <th>Average Salary</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="row : ${results}">
                        <td th:text="${row.department_name}">-</td>
                        <td th:text="${row.floor}">-</td>
                        <td th:text="${row.employee_count}">-</td>
                        <td th:text="${row.total_salary_fund}">-</td>
                        <td th:text="${row.average_salary}">-</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
</body>
</html>
