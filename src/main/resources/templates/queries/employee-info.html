<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Employee Info</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/">EMS</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav">
                <li class="nav-item"><a class="nav-link" href="/departments">Departments</a></li>
                <li class="nav-item"><a class="nav-link" href="/employees">Employees</a></li>
                <li class="nav-item"><a class="nav-link" href="/tasks">Tasks</a></li>
                <li class="nav-item"><a class="nav-link" href="/queries">Queries</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div class="d-flex justify-content-between mb-3">
        <h2>Employee Information</h2>
        <a href="/queries" class="btn btn-secondary">← Back</a>
    </div>

    <div class="table-responsive">
        <table class="table table-striped table-bordered">
            <thead class="table-dark">
            <tr>
                <th>#</th>
                <th>Full Name</th>
                <th>Position</th>
                <th>Phone</th>
                <th>Salary</th>
                <th>Hire Date</th>
                <th>Office</th>
                <th>Department</th>
                <th>Floor</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="row, iterStat : ${results}">
                <td th:text="${iterStat.count}"></td>
                <td th:text="${row.fullName}">-</td>
                <td th:text="${row.position}">-</td>
                <td th:text="${row.contactPhone}">-</td>
                <td th:text="${row.salary}">-</td>
                <td th:text="${row.hireDate}">-</td>
                <td th:text="${row.office}">-</td>
                <td th:text="${row.departmentName}">-</td>
                <td th:text="${row.floor}">-</td>
            </tr>
            </tbody>
        </table>
    </div>
    <div class="mt-3">Found: <strong th:text="${#lists.size(results)}"></strong> employees</div>
</div>
</body>
</html>
