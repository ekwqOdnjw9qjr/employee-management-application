<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Procedure Results</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/">EMS</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav">
                <li class="nav-item"><a class="nav-link" href="/departments">Departments</a></li>
                <li class="nav-item"><a class="nav-link" href="/employees">Employees</a></li>
                <li class="nav-item"><a class="nav-link" href="/tasks">Tasks</a></li>
                <li class="nav-item"><a class="nav-link" href="/queries">Queries</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div class="d-flex justify-content-between mb-3">
        <h2 th:text="${queryName}">Procedure Results</h2>
        <a href="/queries" class="btn btn-secondary">← Back</a>
    </div>

    <div th:if="${results != null and !results.isEmpty()}">
        <div class="table-responsive">
            <table class="table table-striped table-bordered">
                <thead class="table-dark">
                <tr>
                    <th>#</th>
                    <th th:each="key : ${results[0].keySet()}" th:text="${key}"></th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="row, iterStat : ${results}">
                    <td th:text="${iterStat.count}"></td>
                    <td th:each="entry : ${row}" th:text="${entry.value}"></td>
                </tr>
                </tbody>
            </table>
        </div>
        <div class="mt-3">
            <strong>Total records: <span th:text="${results.size()}"></span></strong>
        </div>
    </div>

    <div th:if="${results == null or results.isEmpty()}" class="alert alert-warning text-center">
        <h5>No results found</h5>
        <p class="mb-0">Please try different search criteria.</p>
    </div>
</div>
</body>
</html>
