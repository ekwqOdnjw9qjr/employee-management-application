<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Salary Fund by Department</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/">EMS</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav">
                <li class="nav-item"><a class="nav-link" href="/departments">Departments</a></li>
                <li class="nav-item"><a class="nav-link" href="/employees">Employees</a></li>
                <li class="nav-item"><a class="nav-link" href="/tasks">Tasks</a></li>
                <li class="nav-item"><a class="nav-link" href="/queries">Queries</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>Salary Fund by Department</h2>
        <a href="/queries" class="btn btn-secondary">← Back</a>
    </div>

    <div class="card">
        <div class="card-body">
            <div class="table-responsive">
                <table class="table table-striped table-bordered">
                    <thead class="table-dark">
                    <tr>
                        <th>#</th>
                        <th>Department Name</th>
                        <th>Employees Count</th>
                        <th>Total Salary Fund</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="row, stat : ${results}">
                        <td th:text="${stat.count}"></td>
                        <td th:text="${row.departmentName}">-</td>
                        <td th:text="${row.employeeCount}">-</td>
                        <td th:text="'$ ' + ${row.totalSalaryFund}">-</td>
                    </tr>
                    </tbody>
                </table>
            </div>
            <div class="mt-3">Total: <strong th:text="${#lists.size(results)}"></strong> departments</div>
        </div>
    </div>
</div>
</body>
</html>
