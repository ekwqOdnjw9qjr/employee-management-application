<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Active Tasks</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/">EMS</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav">
                <li class="nav-item"><a class="nav-link" href="/departments">Departments</a></li>
                <li class="nav-item"><a class="nav-link" href="/employees">Employees</a></li>
                <li class="nav-item"><a class="nav-link" href="/tasks">Tasks</a></li>
                <li class="nav-item"><a class="nav-link" href="/queries">Queries</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>Active Tasks</h2>
        <a href="/queries" class="btn btn-secondary">← Back</a>
    </div>

    <div class="card">
        <div class="card-body">
            <div class="table-responsive">
                <table class="table table-striped table-bordered">
                    <thead class="table-dark">
                    <tr>
                        <th>#</th>
                        <th>Task ID</th>
                        <th>Title</th>
                        <th>Description</th>
                        <th>Start Date</th>
                        <th>Deadline</th>
                        <th>Status</th>
                        <th>Assigned Employees</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="row, stat : ${results}">
                        <td th:text="${stat.count}"></td>
                        <td th:text="${row.taskId}">-</td>
                        <td th:text="${row.title}">-</td>
                        <td th:text="${row.description}">-</td>
                        <td th:text="${row.startDate}">-</td>
                        <td th:text="${row.deadline}">-</td>
                        <td><span th:class="${row.status == 'IN_PROGRESS'} ? 'badge bg-primary' : 'badge bg-warning'" th:text="${row.status}"></span></td>
                        <td th:text="${row.assignedEmployeesCount}">-</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
</body>
</html>
