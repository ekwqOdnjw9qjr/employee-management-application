<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Departments</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/">EMS</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav">
                <li class="nav-item"><a class="nav-link" href="/departments">Departments</a></li>
                <li class="nav-item"><a class="nav-link" href="/employees">Employees</a></li>
                <li class="nav-item"><a class="nav-link" href="/tasks">Tasks</a></li>
                <li class="nav-item"><a class="nav-link" href="/histories">Histories</a></li>
                <li class="nav-item"><a class="nav-link" href="/assignments">Assignments</a></li>
                <li class="nav-item"><a class="nav-link" href="/evaluations">Evaluations</a></li>
                <li class="nav-item"><a class="nav-link" href="/trainings">Trainings</a></li>
                <li class="nav-item"><a class="nav-link" href="/queries">Query/Procedure</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

    <div class="d-flex justify-content-between mb-3">
        <h2>Departments</h2>
        <a href="/departments/create" class="btn btn-primary">Add Department</a>
    </div>

    <table class="table table-striped">
        <thead>
        <tr><th>ID</th><th>Name</th><th>Floor</th><th>Employees</th><th>Actions</th></tr>
        </thead>
        <tbody>
        <tr th:each="dept : ${departments}">
            <td th:text="${dept.departmentId}"></td>
            <td th:text="${dept.name}"></td>
            <td th:text="${dept.floor}"></td>
            <td th:text="${dept.employeeCount}"></td>
            <td>
                <a th:href="@{/departments/edit/{id}(id=${dept.departmentId})}" class="btn btn-sm btn-info">Edit</a>
                <form method="post" th:action="@{/departments/delete/{id}(id=${dept.departmentId})}" class="d-inline"
                      onsubmit="return confirm('Delete this department?')">
                    <button type="submit" class="btn btn-sm btn-danger">Delete</button>
                </form>
            </td>
        </tr>
        <tr th:if="${departments.isEmpty()}">
            <td colspan="5" class="text-center">No departments found</td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
