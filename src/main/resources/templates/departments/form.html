<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Department Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/">EMS</a>
    </div>
</nav>

<div class="container mt-4">
    <div class="card">
        <div class="card-header">
            <h3 th:text="${departmentId != null} ? 'Edit Department' : 'Create Department'"></h3>
        </div>
        <div class="card-body">
            <form method="post" th:action="${departmentId != null} ? '/departments/edit/' + ${departmentId} : '/departments/create'"
                  th:object="${departmentRequest}">

                <div class="mb-3">
                    <label class="form-label">Name *</label>
                    <input type="text" class="form-control" th:field="*{name}" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Floor *</label>
                    <input type="number" class="form-control" th:field="*{floor}" required>
                </div>

                <button type="submit" class="btn btn-primary">Save</button>
                <a href="/departments" class="btn btn-secondary">Cancel</a>
            </form>
        </div>
    </div>
</div>
</body>
</html>
