<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Employee Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/">EMS</a>
    </div>
</nav>

<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card">
                <div class="card-header">
                    <h3 th:text="${employeeId != null} ? 'Edit Employee' : 'Create New Employee'"></h3>
                </div>
                <div class="card-body">
                    <form method="post" th:action="${employeeId != null} ? '/employees/edit/' + ${employeeId} : '/employees/create'"
                          th:object="${employeeRequest}" enctype="multipart/form-data">

                        <div class="row">
                            <div class="col-md-4 mb-3">
                                <label class="form-label">Last Name *</label>
                                <input type="text" class="form-control" th:field="*{lastName}" required>
                            </div>
                            <div class="col-md-4 mb-3">
                                <label class="form-label">First Name *</label>
                                <input type="text" class="form-control" th:field="*{firstName}" required>
                            </div>
                            <div class="col-md-4 mb-3">
                                <label class="form-label">Middle Name</label>
                                <input type="text" class="form-control" th:field="*{middleName}">
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Position *</label>
                                <input type="text" class="form-control" th:field="*{position}" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Department *</label>
                                <select class="form-control" th:field="*{departmentId}" required>
                                    <option value="">Select Department</option>
                                    <option th:each="dept : ${departments}" th:value="${dept.departmentId}" th:text="${dept.name}"></option>
                                </select>
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-4 mb-3">
                                <label class="form-label">Phone *</label>
                                <input type="text" class="form-control" th:field="*{phone}" required>
                            </div>
                            <div class="col-md-4 mb-3">
                                <label class="form-label">Salary *</label>
                                <input type="number" step="0.01" class="form-control" th:field="*{salary}" required>
                            </div>
                            <div class="col-md-4 mb-3">
                                <label class="form-label">Office *</label>
                                <input type="text" class="form-control" th:field="*{office}" required>
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Hire Date *</label>
                                <input type="date" class="form-control" th:field="*{hireDate}" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Photo</label>
                                <input type="file" class="form-control" name="photoFile" accept="image/*">
                                <small class="text-muted">Max size: 5MB. Supported: JPG, PNG, GIF</small>
                            </div>
                        </div>

                        <div th:if="${employeeId != null and employeeRequest.photo != null}" class="row">
                            <div class="col-12 mb-3">
                                <label class="form-label">Current Photo</label>
                                <div>
                                    <img th:src="${employeeRequest.photo}" style="max-width: 150px; max-height: 150px;" alt="Employee photo" class="img-thumbnail">
                                </div>
                            </div>
                        </div>

                        <input type="hidden" th:field="*{photo}" value="/images/default-avatar.png">

                        <div class="d-flex justify-content-between">
                            <button type="submit" class="btn btn-primary">Save</button>
                            <a href="/employees" class="btn btn-secondary">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
