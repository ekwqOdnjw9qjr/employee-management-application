<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Employees</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .employee-photo {
            width: 45px;
            height: 45px;
            object-fit: cover;
            border-radius: 50%;
            border: 2px solid #ddd;
        }
        .table th, .table td {
            vertical-align: middle;
        }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/">EMS</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav">
                <li class="nav-item"><a class="nav-link" href="/departments">Departments</a></li>
                <li class="nav-item"><a class="nav-link" href="/employees">Employees</a></li>
                <li class="nav-item"><a class="nav-link" href="/tasks">Tasks</a></li>
                <li class="nav-item"><a class="nav-link" href="/histories">Histories</a></li>
                <li class="nav-item"><a class="nav-link" href="/assignments">Assignments</a></li>
                <li class="nav-item"><a class="nav-link" href="/evaluations">Evaluations</a></li>
                <li class="nav-item"><a class="nav-link" href="/trainings">Trainings</a></li>
                <li class="nav-item"><a class="nav-link" href="/queries">Query/Procedure</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

    <div class="d-flex justify-content-between mb-3">
        <h2>Employees</h2>
        <a href="/employees/create" class="btn btn-primary">Add Employee</a>
    </div>

    <div class="table-responsive">
        <table class="table table-striped table-hover">
            <thead class="table-dark">
            <tr>
                <th>Photo</th>
                <th>ID</th>
                <th>Full Name</th>
                <th>Position</th>
                <th>Department</th>
                <th>Phone</th>
                <th>Salary</th>
                <th>Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="emp : ${employees}">
                <td>
                    <img th:src="${emp.photo}"
                         class="employee-photo"
                         alt="Photo"
                         onerror="this.src='/images/default-avatar.png'">
                </td>
                <td th:text="${emp.employeeId}"></td>
                <td th:text="${emp.lastName} + ' ' + ${emp.firstName} + ' ' + ${emp.middleName}"></td>
                <td th:text="${emp.position}"></td>
                <td th:text="${emp.departmentName}"></td>
                <td th:text="${emp.phone}"></td>
                <td th:text="${emp.salary}"></td>
                <td>
                    <a th:href="@{/employees/edit/{id}(id=${emp.employeeId})}" class="btn btn-sm btn-info">Edit</a>
                    <form method="post" th:action="@{/employees/delete/{id}(id=${emp.employeeId})}" class="d-inline"
                          onsubmit="return confirm('Delete this employee?')">
                        <button type="submit" class="btn btn-sm btn-danger">Delete</button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
