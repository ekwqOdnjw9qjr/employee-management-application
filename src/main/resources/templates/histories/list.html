<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Employee Histories</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/">EMS</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav">
                <li class="nav-item"><a class="nav-link" href="/departments">Departments</a></li>
                <li class="nav-item"><a class="nav-link" href="/employees">Employees</a></li>
                <li class="nav-item"><a class="nav-link" href="/tasks">Tasks</a></li>
                <li class="nav-item"><a class="nav-link" href="/histories">Histories</a></li>
                <li class="nav-item"><a class="nav-link" href="/assignments">Assignments</a></li>
                <li class="nav-item"><a class="nav-link" href="/evaluations">Evaluations</a></li>
                <li class="nav-item"><a class="nav-link" href="/trainings">Trainings</a></li>
                <li class="nav-item"><a class="nav-link" href="/queries">Query/Procedure</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

    <div class="d-flex justify-content-between mb-3">
        <h2>Employee Change History</h2>
        <a href="/histories/create" class="btn btn-primary">+ Add History Record</a>
    </div>

    <div class="table-responsive">
        <table class="table table-striped table-hover">
            <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Employee</th>
                <th>Change Date</th>
                <th>Change Type</th>
                <th>Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="history : ${histories}">
                <td th:text="${history.historyId}"></td>
                <td th:text="${history.employeeFullName}"></td>
                <td th:text="${history.changeDate}"></td>
                <td>
                            <span th:class="${history.changeType == 'HIRED'} ? 'badge bg-success' :
                                          (history.changeType == 'PROMOTED' ? 'badge bg-primary' :
                                          (history.changeType == 'RESIGNED' ? 'badge bg-danger' : 'badge bg-secondary'))"
                                  th:text="${history.changeType}"></span>
                </td>
                <td>
                    <a th:href="@{/histories/edit/{id}(id=${history.historyId})}" class="btn btn-sm btn-info">Edit</a>
                    <form method="post" th:action="@{/histories/delete/{id}(id=${history.historyId})}" class="d-inline"
                          onsubmit="return confirm('Delete this record?')">
                        <button type="submit" class="btn btn-sm btn-danger">Delete</button>
                    </form>
                </td>
            </tr>
            <tr th:if="${histories.isEmpty()}">
                <td colspan="5" class="text-center">No history records found</td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
