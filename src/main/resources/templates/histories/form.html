<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${historyId != null} ? 'Edit History' : 'Create History'"></title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/">EMS</a>
    </div>
</nav>

<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header">
                    <h3 th:text="${historyId != null} ? 'Edit History Record' : 'Create History Record'"></h3>
                </div>
                <div class="card-body">
                    <form method="post" th:action="${historyId != null} ? '/histories/edit/' + ${historyId} : '/histories/create'"
                          th:object="${historyRequest}">

                        <div class="mb-3">
                            <label class="form-label">Employee *</label>
                            <select class="form-control" th:field="*{employeeId}" required>
                                <option value="">Select Employee</option>
                                <option th:each="emp : ${employees}" th:value="${emp.employeeId}"
                                        th:text="${emp.lastName} + ' ' + ${emp.firstName} + ' (' + ${emp.position} + ')'"></option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Change Date *</label>
                            <input type="date" class="form-control" th:field="*{changeDate}" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Change Type *</label>
                            <select class="form-control" th:field="*{changeType}" required>
                                <option value="HIRED">Hired</option>
                                <option value="PROMOTED">Promoted</option>
                                <option value="DEPARTMENT_CHANGE">Department Change</option>
                                <option value="SALARY_CHANGE">Salary Change</option>
                                <option value="RESIGNED">Resigned</option>
                                <option value="TERMINATED">Terminated</option>
                            </select>
                        </div>

                        <div class="d-flex justify-content-between">
                            <button type="submit" class="btn btn-primary">Save</button>
                            <a href="/histories" class="btn btn-secondary">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
