<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Task Assignments</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/">EMS</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav">
                <li class="nav-item"><a class="nav-link" href="/departments">Departments</a></li>
                <li class="nav-item"><a class="nav-link" href="/employees">Employees</a></li>
                <li class="nav-item"><a class="nav-link" href="/tasks">Tasks</a></li>
                <li class="nav-item"><a class="nav-link" href="/histories">Histories</a></li>
                <li class="nav-item"><a class="nav-link" href="/assignments">Assignments</a></li>
                <li class="nav-item"><a class="nav-link" href="/evaluations">Evaluations</a></li>
                <li class="nav-item"><a class="nav-link" href="/trainings">Trainings</a></li>
                <li class="nav-item"><a class="nav-link" href="/queries">Query/Procedure</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

    <div class="d-flex justify-content-between mb-3">
        <h2>Task Assignments</h2>
        <a href="/assignments/create" class="btn btn-primary">+ Add Assignment</a>
    </div>

    <div class="table-responsive">
        <table class="table table-striped table-hover">
            <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Employee</th>
                <th>Task</th>
                <th>Role</th>
                <th>Assignment Date</th>
                <th>Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="assignment : ${assignments}">
                <td th:text="${assignment.assignmentId}"></td>
                <td th:text="${assignment.employeeFullName}"></td>
                <td th:text="${assignment.taskTitle}"></td>
                <td><span class="badge bg-info" th:text="${assignment.roleInTask}"></span></td>
                <td th:text="${assignment.assignmentDate}"></td>
                <td>
                    <a th:href="@{/assignments/edit/{id}(id=${assignment.assignmentId})}" class="btn btn-sm btn-info">Edit</a>
                    <form method="post" th:action="@{/assignments/delete/{id}(id=${assignment.assignmentId})}" class="d-inline"
                          onsubmit="return confirm('Delete this assignment?')">
                        <button type="submit" class="btn btn-sm btn-danger">Delete</button>
                    </form>
                </td>
            </tr>
            <tr th:if="${assignments.isEmpty()}">
                <td colspan="6" class="text-center">No assignments found</td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
