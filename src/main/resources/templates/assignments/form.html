<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${assignmentId != null} ? 'Edit Assignment' : 'Create Assignment'"></title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/">EMS</a>
    </div>
</nav>

<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header">
                    <h3 th:text="${assignmentId != null} ? 'Edit Assignment' : 'Create Assignment'"></h3>
                </div>
                <div class="card-body">
                    <form method="post" th:action="${assignmentId != null} ? '/assignments/edit/' + ${assignmentId} : '/assignments/create'"
                          th:object="${assignmentRequest}">

                        <div class="mb-3">
                            <label class="form-label">Employee *</label>
                            <select class="form-control" th:field="*{employeeId}" required>
                                <option value="">Select Employee</option>
                                <option th:each="emp : ${employees}" th:value="${emp.employeeId}"
                                        th:text="${emp.lastName} + ' ' + ${emp.firstName} + ' (' + ${emp.position} + ')'"></option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Task *</label>
                            <select class="form-control" th:field="*{taskId}" required>
                                <option value="">Select Task</option>
                                <option th:each="task : ${tasks}" th:value="${task.taskId}"
                                        th:text="${task.title} + ' (' + ${task.status} + ')'"></option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Role in Task *</label>
                            <input type="text" class="form-control" th:field="*{roleInTask}" required
                                   placeholder="e.g., Developer, Tester, Manager, Lead">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Assignment Date *</label>
                            <input type="date" class="form-control" th:field="*{assignmentDate}" required>
                        </div>

                        <div class="d-flex justify-content-between">
                            <button type="submit" class="btn btn-primary">Save</button>
                            <a href="/assignments" class="btn btn-secondary">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
