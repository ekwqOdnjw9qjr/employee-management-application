<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Tasks</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/">EMS</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav">
                <li class="nav-item"><a class="nav-link" href="/departments">Departments</a></li>
                <li class="nav-item"><a class="nav-link" href="/employees">Employees</a></li>
                <li class="nav-item"><a class="nav-link" href="/tasks">Tasks</a></li>
                <li class="nav-item"><a class="nav-link" href="/histories">Histories</a></li>
                <li class="nav-item"><a class="nav-link" href="/assignments">Assignments</a></li>
                <li class="nav-item"><a class="nav-link" href="/evaluations">Evaluations</a></li>
                <li class="nav-item"><a class="nav-link" href="/trainings">Trainings</a></li>
                <li class="nav-item"><a class="nav-link" href="/queries">Query/Procedure</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div th:if="${success}" class="alert alert-success alert-dismissible fade show" th:text="${success}">
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="d-flex justify-content-between mb-3">
        <h2>Tasks Management</h2>
        <a href="/tasks/create" class="btn btn-primary">+ Add New Task</a>
    </div>

    <div class="table-responsive">
        <table class="table table-striped table-hover">
            <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Title</th>
                <th>Description</th>
                <th>Start Date</th>
                <th>Deadline</th>
                <th>Status</th>
                <th>Assignments</th>
                <th>Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="task : ${tasks}">
                <td th:text="${task.taskId}"></td>
                <td th:text="${task.title}"></td>
                <td th:text="${task.description}"></td>
                <td th:text="${task.startDate}"></td>
                <td th:text="${task.deadline}"></td>
                <td>
                            <span th:class="${task.status == 'COMPLETED'} ? 'badge bg-success' :
                                          (task.status == 'IN_PROGRESS' ? 'badge bg-primary' :
                                          (task.status == 'PENDING' ? 'badge bg-warning' : 'badge bg-secondary'))"
                                  th:text="${task.status}"></span>
                </td>
                <td th:text="${task.assignedEmployeesCount}"></td>
                <td>
                    <a th:href="@{/tasks/edit/{id}(id=${task.taskId})}" class="btn btn-sm btn-info">Edit</a>
                    <form method="post" th:action="@{/tasks/delete/{id}(id=${task.taskId})}" class="d-inline"
                          onsubmit="return confirm('Are you sure you want to delete this task?')">
                        <button type="submit" class="btn btn-sm btn-danger">Delete</button>
                    </form>
                </td>
            </tr>
            <tr th:if="${tasks.isEmpty()}">
                <td colspan="8" class="text-center">No tasks found. Click "Add New Task" to create one.</td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
